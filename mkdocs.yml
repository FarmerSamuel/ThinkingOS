site_name: ThinkingOS
site_description: An AI-agnostic framework for reusable, validated thinking skills.
site_url: https://farmersamuel.github.io/ThinkingOS/
repo_url: https://github.com/FarmerSamuel/ThinkingOS
repo_name: FarmerSamuel/ThinkingOS
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Concepts:
      - Architecture: architecture.md
      - Core Design Principles: design-principles.md
      - Reasoning Engine: engine.md
      - Thinking Language: thinking-language.md
      - Thinking Graph: thinking-graph.md
      - Evaluation Model: evaluation-model.md
  - Specifications:
      - Skill Specification: skill-specification.md
      - Skill Lifecycle: skill-lifecycle.md
      - Skill Dependencies: skill-dependencies.md
      - Naming Conventions: naming-conventions.md
  - Guides:
      - Right Problem Guide: right-problem-guide.md
      - Claude Guide: claude-guide.md
      - Developer Guide: developer-guide.md
      - SDK Guide: sdk-guide.md
      - Skill Author Guide: skill-author-guide.md
      - Contribution Guide: contribution-guide.md
  - Project:
      - Roadmap: roadmap.md
      - Future Work: future-work.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: false
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 繁體中文
          build: true
          site_name: ThinkingOS 繁體中文文件
          site_description: 可重複使用、經過驗證且不綁定 AI 平台的思考框架。
          nav_translations:
            Home: 首頁
            Concepts: 核心概念
            Architecture: 架構
            Core Design Principles: 核心設計原則
            Reasoning Engine: 推理引擎
            Thinking Language: 思考語言
            Thinking Graph: 思考圖譜
            Evaluation Model: 評估模型
            Specifications: 規格
            Skill Specification: 技能規格
            Skill Lifecycle: 技能生命週期
            Skill Dependencies: 技能相依關係
            Naming Conventions: 命名慣例
            Guides: 指南
            Right Problem Guide: 問對問題指南
            Claude Guide: Claude 使用指南
            Developer Guide: 開發者指南
            SDK Guide: SDK 指南
            Skill Author Guide: 技能作者指南
            Contribution Guide: 貢獻指南
            Project: 專案
            Roadmap: 路線圖
            Future Work: 未來工作

strict: true
