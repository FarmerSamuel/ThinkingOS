id: right-problem
name: Right Problem
version: 1.0.0
status: released
category: problem-framing
author: FarmerSamuel
requires:
  - ProblemStatement
  - Goal
produces:
  - ValidatedProblem
  - ClarifiedGoal
  - ProblemAssumptions
dependencies: []
nextSkill:
  - id: constraints
    condition: The problem is valid and governing constraints require explicit analysis.
  - id: break-it-down
    condition: The problem is valid but too broad or complex for direct analysis.
