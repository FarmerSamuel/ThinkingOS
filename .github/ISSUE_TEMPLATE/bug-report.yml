name: Bug report
description: Report a reproducible defect in a contract, skill, tool, adapter, or documentation build.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve ThinkingOS. Do not include secrets or private data.
  - type: dropdown
    id: layer
    attributes:
      label: Affected layer
      options: [Core, Engine, Specification, Skill, Knowledge, Adapter, Tooling, Documentation]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe input and steps that reproduce the defect.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include validation output, logs, or screenshots with sensitive information removed.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets and personal data.
          required: true
