name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Repository contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate schemas, registry, skills, and docs
        run: python tools/validate_repository.py

      - name: Run adapter contract tests
        run: python -m unittest discover -s tests -v

      - name: Build distributable package
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build

  docs:
    name: Strict documentation build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt

      - name: Build documentation in strict mode
        run: mkdocs build --strict

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
